<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="header-catalog">
        <section class="logo-icon">
            <img src="../src/assets/Logo.png" alt="Logo da Empresa">
        </section>
        <form class="search-container">
            <input type="text" placeholder="Buscar">
            <button type="submit"><i class="fas fa-search"></i></button>
        </form>
        <form class="form-container">
            <a href="../index.html" class="profile-icon">
                <img src="../src/assets/Vector.png" alt="Perfil do Usuário">
            </a>
        </form>
    </div>

    <header class="product-header">
        <a href="../index.html" class="back-btn">←</a>
        <h2>Produto Detalhe</h2>
    </header>

    <main class="product-detail">
        <section class="product-images"></section>

        <section class="product-info">
            <h1 class="product-title"></h1>
            <p class="product-price"></p>
            <p class="description-label">Descrição do produto:</p>
            <p class="product-description"></p>
            <div class="buttons-container">
                <button class="btn-buy">Comprar Agora</button>
                <button class="btn-cart">Adicionar ao carrinho</button>
            </div>
        </section>
    </main>

    <section class="related-products">
        <p class="related-title">-Você também pode gostar -</p>
        <div class="related-grid" id="related-grid"></div>
    </section>

    <nav class="bottom-nav">
        <a href="../index.html" class="nav-item">
            <span class="nav-icon"></span>
            <span>Início</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon"></span>
            <span>Categorias</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon"></span>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="../src/javascript/utils.js"></script>
    <script src="../src/javascript/product-detail.js"></script>
    <script src="../src/javascript/app.js"></script>
</body>

</html>
