<div class="profile-page">

  <main class="profile-main">
    <section class="profile-card">

      <div class="profile-avatar-wrap">
        <img
          id="profile-avatar"
          src="src/assets/icons/perfil.svg"
          class="profile-avatar"
        >
      </div>

      <h1 id="profile-title" class="profile-name">
        PERFIL
      </h1>

      <form class="profile-form" id="profile-form">

        <!-- ID -->
        <div class="profile-field">
          <label>ID</label>

          <div class="input-wrapper">
            <input
              type="text"
              id="profile-id"
              readonly
            >
          </div>
        </div>

        <!-- USERNAME -->
        <div class="profile-field">
          <label>USERNAME</label>

          <div class="input-wrapper">
            <input
              type="text"
              id="profile-name-field"
              readonly
            >

            <img
              src="src/assets/icons/edit.svg"
              class="edit-icon"
              onclick="toggleEdit('profile-name-field')"
            >
          </div>
        </div>

        <!-- EMAIL -->
        <div class="profile-field">
          <label>E-MAIL</label>

          <div class="input-wrapper">
            <input
              type="email"
              id="profile-email-field"
              readonly
            >
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="profile-field">
          <label>PASSWORD</label>

          <div class="input-wrapper">
            <input
              type="password"
              id="profile-password-field"
              placeholder="********"
              readonly
            >

            <img
              src="src/assets/icons/edit.svg"
              class="edit-icon"
              onclick="toggleEdit('profile-password-field')"
            >
          </div>
        </div>

        <!-- ROLE -->
        <div class="profile-field">
          <label>ROLE</label>

          <div class="input-wrapper">
            <input
              type="text"
              id="profile-role-field"
              readonly
            >
          </div>
        </div>

      </form>

      <p id="profile-message" class="profile-message"></p>

      <div class="profile-actions">

        <button
          id="profile-refresh"
          class="btn confirm"
        >
          CONFIRMAR
        </button>

        <button
          id="profile-logout"
          class="btn logout"
          onclick="setupLogout();"
        >
          SAIR
        </button>

      </div>

    </section>
  </main>

</div>
